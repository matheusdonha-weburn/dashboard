<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Donha Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --red:       #E3001B;
    --red-dark:  #A80014;
    --red-glow:  rgba(227,0,27,0.18);
    --black:     #0A0A0A;
    --surface:   #111111;
    --surface2:  #181818;
    --surface3:  #202020;
    --border:    rgba(255,255,255,0.07);
    --border-red:rgba(227,0,27,0.35);
    --text:      #F0F0F0;
    --text-dim:  #888888;
    --text-muted:#444444;
    --green:     #22c55e;
    --amber:     #f59e0b;
    --green-glow:rgba(34,197,94,0.2);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    padding: 22px 40px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    gap: 20px; flex-wrap: wrap;
    background: linear-gradient(180deg, rgba(227,0,27,0.06) 0%, transparent 100%);
  }

  .logo-area { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    width: 40px; height: 40px; background: var(--red);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: white;
    box-shadow: 0 0 20px var(--red-glow);
  }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 3px; line-height: 1; }
  h1 span { color: var(--red); }

  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
  .status-label { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── TOP NAV TABS ── */
  .top-nav {
    display: flex; align-items: center; gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    position: relative; z-index: 20;
  }

  .top-tab {
    padding: 14px 22px;
    border: none; border-bottom: 2px solid transparent;
    background: transparent; color: var(--text-dim);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.18s; white-space: nowrap;
    display: flex; align-items: center; gap: 7px;
    margin-bottom: -1px;
  }
  .top-tab:hover { color: var(--text); }
  .top-tab.active { color: var(--text); border-bottom-color: var(--red); }
  .top-tab .tab-icon { font-size: 14px; }

  /* ── CONTROLS ── */
  .controls {
    position: relative; z-index: 10;
    padding: 13px 40px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .seg-tabs {
    display: flex; gap: 3px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 4px;
  }
  .seg-tab {
    padding: 6px 14px; border-radius: 7px; border: none;
    background: transparent; color: var(--text-dim);
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.18s; white-space: nowrap;
  }
  .seg-tab:hover { color: var(--text); background: var(--surface3); }
  .seg-tab.active { background: var(--red); color: #fff; box-shadow: 0 0 16px var(--red-glow); }

  /* view toggle */
  .view-toggle {
    display: flex; gap: 3px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 4px;
  }
  .view-btn {
    padding: 6px 13px; border-radius: 7px; border: 1px solid transparent;
    background: transparent; color: var(--text-dim);
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.18s;
    display: flex; align-items: center; gap: 6px;
  }
  .view-btn:hover { color: var(--text); background: var(--surface3); }
  .view-btn.active { background: var(--surface3); color: var(--text); border-color: var(--border-red); }

  /* dates */
  .date-group { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-wrap: wrap; }
  .date-label { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }
  input[type="date"] {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    padding: 6px 11px; outline: none; transition: border-color 0.2s; cursor: pointer;
  }
  input[type="date"]:focus { border-color: var(--red); }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
  .btn-apply {
    padding: 7px 16px; background: var(--red); border: none;
    border-radius: 8px; color: #fff; font-family: 'DM Sans', sans-serif;
    font-weight: 600; font-size: 12px; cursor: pointer; transition: all 0.18s;
    box-shadow: 0 0 14px var(--red-glow);
  }
  .btn-apply:hover { background: var(--red-dark); transform: translateY(-1px); }

  /* ── MAIN ── */
  main { position: relative; z-index: 1; padding: 26px 40px; display: flex; flex-direction: column; gap: 26px; }

  /* ── PAGE PANELS ── */
  .page { display: none; flex-direction: column; gap: 26px; }
  .page.active { display: flex; }

  /* ── CARDS ── */
  .cards-section { display: flex; flex-direction: column; gap: 10px; }
  .cards-section-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .cards-section-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--text-muted); text-transform: uppercase; }

  .btn-toggle-secondary {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 13px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text-dim); font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.18s;
  }
  .btn-toggle-secondary:hover { border-color: var(--border-red); color: var(--text); }
  .btn-toggle-secondary.active { border-color: var(--border-red); color: var(--text); background: rgba(227,0,27,0.08); }

  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 12px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px; position: relative; overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px; background: var(--red); opacity: 0; transition: opacity 0.2s;
  }
  .card:hover { border-color: var(--border-red); transform: translateY(-2px); }
  .card:hover::before { opacity: 1; }
  .card.highlight { border-color: var(--border-red); background: linear-gradient(135deg, var(--surface) 0%, rgba(227,0,27,0.05) 100%); }
  .card.highlight::before { opacity: 1; }
  .card.card-green { border-color: rgba(34,197,94,0.35); background: linear-gradient(135deg, var(--surface) 0%, rgba(34,197,94,0.05) 100%); }
  .card.card-green::before { background: var(--green); opacity: 1; }

  .secondary-block { display: none; flex-direction: column; gap: 10px; }
  .secondary-block.visible { display: flex; }

  .card-icon { font-size: 16px; margin-bottom: 10px; display: block; }
  .card-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; margin-bottom: 5px; }
  .card-value { font-family: 'Bebas Neue', sans-serif; font-size: 38px; line-height: 1; color: var(--text); }
  .card-value.is-rate { font-size: 30px; color: var(--red); }
  .card-value.is-green-rate { font-size: 30px; color: var(--green); }
  .card-value.na { font-size: 26px; color: var(--text-muted); }
  .card-sub { font-size: 11px; color: var(--text-muted); margin-top: 5px; font-family: 'JetBrains Mono', monospace; }
  .card-note { font-size: 10px; color: var(--amber); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }

  .extras-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .extras-row .card { flex: 1; min-width: 170px; max-width: 260px; border-color: rgba(245,158,11,0.2); }
  .extras-row .card::before { background: var(--amber); }
  .extras-row .card:hover { border-color: rgba(245,158,11,0.45); }

  /* ── TABLE VIEW ── */
  .table-wrap { overflow-x: auto; border-radius: 14px; border: 1px solid var(--border); background: var(--surface); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 700px; }
  thead tr { background: var(--surface2); border-bottom: 1px solid var(--border-red); }
  thead th { padding: 11px 14px; text-align: left; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1.5px; color: var(--text-dim); text-transform: uppercase; white-space: nowrap; font-weight: 600; }
  thead th:first-child { color: var(--red); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 9px 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text); white-space: nowrap; }
  tbody td:first-child { color: var(--text-dim); font-size: 11px; }
  tfoot tr { border-top: 1px solid var(--border-red); background: var(--surface2); }
  tfoot td { padding: 10px 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; }
  tfoot td:first-child { color: var(--red); font-size: 10px; letter-spacing: 2px; }

  /* pct color classes */
  td.pct-green  { color: var(--green) !important; font-weight: 600; }
  td.pct-white  { color: var(--text)  !important; }
  td.pct-red    { color: var(--red)   !important; font-weight: 600; }
  td.val-green  { color: var(--green) !important; }
  td.val-red    { color: var(--red)   !important; font-weight: 600; }
  td.val-na     { color: var(--text-muted) !important; }

  /* ── CHART ── */
  .chart-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .chart-header { padding: 18px 22px 0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .chart-title { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 2px; }
  .toggles { display: flex; gap: 6px; flex-wrap: wrap; }
  .metric-toggle {
    display: flex; align-items: center; gap: 5px; padding: 5px 11px;
    border-radius: 20px; border: 1px solid var(--border); background: var(--surface2);
    cursor: pointer; font-size: 11px; font-weight: 500; color: var(--text-dim);
    transition: all 0.18s; user-select: none; white-space: nowrap;
  }
  .metric-toggle .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .metric-toggle.active { border-color: transparent; color: var(--text); }
  .chart-body { padding: 18px 22px 22px; height: 300px; position: relative; }

  /* ── FUNNEL ── */
  .funnel-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px; display: flex; flex-direction: column; gap: 8px; }
  .funnel-title { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 2px; margin-bottom: 6px; }
  .funnel-step { display: flex; align-items: center; gap: 14px; }
  .funnel-bar-wrap { flex: 1; position: relative; height: 42px; display: flex; align-items: center; }
  .funnel-bar-bg { position: absolute; inset: 0; background: var(--surface2); border-radius: 8px; }
  .funnel-bar-fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 8px; background: var(--red); transition: width 0.6s cubic-bezier(.34,1.56,.64,1); min-width: 2px; }
  .funnel-bar-text { position: relative; z-index: 1; padding: 0 14px; display: flex; align-items: center; justify-content: space-between; width: 100%; }
  .funnel-step-name { font-size: 12px; font-weight: 600; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.7); white-space: nowrap; }
  .funnel-step-val { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.7); }
  .funnel-pct { width: 54px; text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .funnel-connector { width: 2px; height: 8px; background: linear-gradient(to bottom, var(--red), transparent); margin-left: calc(50% - 1px); }

  /* ── SALES PAGE ── */
  .sales-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  .sales-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; position: relative; overflow: hidden; transition: border-color 0.2s, transform 0.2s; }
  .sales-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; opacity:0; transition:opacity 0.2s; }
  .sales-card:hover { transform: translateY(-2px); }
  .sales-card:hover::before { opacity:1; }
  .sales-card.s-revenue { border-color: rgba(34,197,94,0.35); background: linear-gradient(135deg, var(--surface) 0%, rgba(34,197,94,0.05) 100%); }
  .sales-card.s-revenue::before { background: var(--green); opacity:1; }
  .sales-card.s-count { border-color: var(--border-red); background: linear-gradient(135deg, var(--surface) 0%, rgba(227,0,27,0.05) 100%); }
  .sales-card.s-count::before { background: var(--red); opacity:1; }
  .sales-card.s-ticket { border-color: rgba(245,158,11,0.35); background: linear-gradient(135deg, var(--surface) 0%, rgba(245,158,11,0.05) 100%); }
  .sales-card.s-ticket::before { background: var(--amber); opacity:1; }
  .sc-icon { font-size: 18px; margin-bottom: 10px; display: block; }
  .sc-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; margin-bottom: 6px; }
  .sc-value { font-family: 'Bebas Neue', sans-serif; font-size: 40px; line-height: 1; color: var(--text); }
  .sc-value.green { color: var(--green); }
  .sc-value.amber { color: var(--amber); }
  .sc-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }

  /* Sales table */
  .sales-table-wrap { overflow-x: auto; border-radius: 14px; border: 1px solid var(--border); background: var(--surface); }
  .stbl { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px; }
  .stbl thead tr { background: var(--surface2); border-bottom: 1px solid rgba(34,197,94,0.3); }
  .stbl thead th { padding: 12px 16px; text-align: left; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1.5px; color: var(--text-dim); text-transform: uppercase; white-space: nowrap; }
  .stbl tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .stbl tbody tr:last-child { border-bottom: none; }
  .stbl tbody tr:hover { background: var(--surface2); }
  .stbl tbody td { padding: 11px 16px; color: var(--text); font-size: 13px; }
  .stbl td.td-name { font-weight: 500; }
  .stbl td.td-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .stbl td.td-val  { font-family: 'JetBrains Mono', monospace; color: var(--green); font-weight: 600; white-space: nowrap; }
  .stbl td.td-prod { font-size: 12px; color: var(--text-dim); max-width: 340px; }
  .stbl tfoot tr { border-top: 1px solid rgba(34,197,94,0.3); background: var(--surface2); }
  .stbl tfoot td { padding: 10px 16px; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; }
  .stbl tfoot td.tf-label { color: var(--green); font-size: 10px; letter-spacing: 2px; }
  .stbl tfoot td.tf-val   { color: var(--green); }

  /* ── LOADING ── */
  .overlay { position:fixed; inset:0; background:rgba(10,10,10,0.93); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; gap:14px; }
  .spinner { width:42px; height:42px; border:3px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .overlay-text { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-dim); letter-spacing:2px; }
  .error-box { background:rgba(227,0,27,0.1); border:1px solid var(--red); border-radius:12px; padding:24px 32px; text-align:center; max-width:460px; }
  .error-box h3 { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--red); margin-bottom:8px; }
  .error-box p  { font-size:13px; color:var(--text-dim); line-height:1.6; }
  .empty-state { padding:40px; text-align:center; color:var(--text-muted); font-size:13px; font-family:'JetBrains Mono',monospace; }

  @media(max-width:768px){
    header,.top-nav,.controls,main{padding-left:16px;padding-right:16px;}
    .date-group{margin-left:0;width:100%;}
    .cards-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
    .top-tab{padding:12px 14px;font-size:12px;}
  }
</style>
</head>
<body>

<div class="overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="overlay-text">CARREGANDO DADOS...</div>
</div>

<!-- HEADER -->
<header>
  <div class="logo-area">
    <div class="logo-icon">D</div>
    <h1>DONHA <span>DASHBOARD</span></h1>
  </div>
  <div class="header-right">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-label" id="statusLabel">AGUARDANDO</div>
  </div>
</header>

<!-- TOP NAVIGATION TABS -->
<nav class="top-nav">
  <button class="top-tab active" data-page="metrics">
    <span class="tab-icon">📊</span> Métricas
  </button>
  <button class="top-tab" data-page="sales">
    <span class="tab-icon">💰</span> Vendas
  </button>
</nav>

<!-- CONTROLS (shared date bar, seg tabs only for metrics) -->
<div class="controls" id="controlsBar">
  <!-- Metrics segment tabs -->
  <div class="seg-tabs" id="segTabsWrap">
    <button class="seg-tab active" data-seg="mkt">MKT</button>
    <button class="seg-tab" data-seg="todos">TODOS</button>
    <button class="seg-tab" data-seg="assinaturas">ASSINATURAS ATIVAS</button>
    <button class="seg-tab" data-seg="webhook">WEBHOOK</button>
  </div>

  <!-- View toggle (metrics only) -->
  <div class="view-toggle" id="viewToggleWrap">
    <button class="view-btn active" id="btnViewCards">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="7" height="7" rx="1.5"/><rect x="9" y="0" width="7" height="7" rx="1.5"/><rect x="0" y="9" width="7" height="7" rx="1.5"/><rect x="9" y="9" width="7" height="7" rx="1.5"/></svg>
      Cards
    </button>
    <button class="view-btn" id="btnViewTable">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="16" height="3" rx="1"/><rect x="0" y="6" width="16" height="3" rx="1"/><rect x="0" y="12" width="16" height="3" rx="1"/></svg>
      Tabela
    </button>
  </div>

  <!-- Date range -->
  <div class="date-group">
    <span class="date-label">DE</span>
    <input type="date" id="dateFrom"/>
    <span class="date-label">ATÉ</span>
    <input type="date" id="dateTo"/>
    <button class="btn-apply" id="btnApply">APLICAR</button>
  </div>

  <!-- Sales date range (hidden by default) -->
  <div class="date-group" id="salesDateGroup" style="display:none;">
    <span class="date-label">DE</span>
    <input type="date" id="salesDateFrom"/>
    <span class="date-label">ATÉ</span>
    <input type="date" id="salesDateTo"/>
    <button class="btn-apply" id="btnSalesApply">APLICAR</button>
  </div>
</div>

<!-- MAIN -->
<main>

  <!-- ════ PAGE: METRICS ════ -->
  <div class="page active" id="pageMetrics">

    <!-- CARDS VIEW -->
    <div id="cardsView">
      <div class="cards-section">
        <div class="cards-section-header">
          <div class="cards-section-label">MÉTRICAS PRINCIPAIS</div>
          <button class="btn-toggle-secondary" id="btnToggleSecondary">

<script>
// ════════════════════════════════════════════════════════
// CONFIG

const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxBoesSkxWCPatXXwUaPxYE8ugcfknJ3vKGZgZTVEG97TdljMYt9CvUtIOy7VXvDlZoLA/exec';
const SHEET_ID         = '131kOelD9Uzr3SzgFdvRKBHM3Wc25QmkIo7tTHlw1ADw';
const SALES_SHEET_ID   = '131kOelD9Uzr3SzgFdvRKBHM3Wc25QmkIo7tTHlw1ADw'; // mesmo spreadsheet
const CSV_DADOS_URL    = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=DADOS`;
const CSV_VENDAS_URL   = `https://docs.google.com/spreadsheets/d/${SALES_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=VENDAS`;

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
let allData       = [];
let allSales      = [];  // only rows with venda=Sim AND valor != null/empty

// ─── PCT COLOR RULES ───────────────────────────────────
const PCT_RULES = {
  taxaConexao: { low:20, high:30 },   // <20 red, 20-30 white, >30 green
  convTotal:   { low:3.5, high:6 },   // <3.5 red, 3.5-6 white, >6 green
  convConexao: { low:5, high:10 },    // <5 red, 5-10 white, >10 green
};

function pctClass(key, val) {
  if (val === null) return 'val-na';
  const rule = PCT_RULES[key];
  if (!rule) return '';
  if (val < rule.low)  return 'pct-red';
  if (val > rule.high) return 'pct-green';
  return 'pct-white';
}

// ─── METRICS CONFIG ────────────────────────────────────

const PRIMARY_CARDS = [

const METRICS_CONFIG = [

// ════════════════════════════════════════════════════════
// FETCH
// ════════════════════════════════════════════════════════
async function fetchData() {
  // Try App Script first
  if (APP_SCRIPT_URL !== 'SEU_APP_SCRIPT_URL_AQUI') {
    try {
      const r = await fetch(APP_SCRIPT_URL);
      if (r.ok) { const json = await r.json(); allData = json.dados; allSales = json.vendas; setStatus('online'); return; }
    } catch(e) {}
  }
  // CSV fallback for DADOS
  try {
    const [rd, rv] = await Promise.all([fetch(CSV_DADOS_URL), fetch(CSV_VENDAS_URL)]);
    if (!rd.ok) throw new Error('dados');
    allData  = parseCSVDados(await rd.text());
    allSales = rv.ok ? parseCSVVendas(await rv.text()) : [];
    setStatus('csv');
  } catch(e) { setStatus('error'); showError(); }
}

// ── DADOS parser ──
function parseCSVDados(text) {
  const lines = text.split('\n').map(l=>l.replace(/\r/g,''));
  const out = [];
  for (let i=1;i<lines.length;i++) {
    const row = csvLine(lines[i]);
    if (!row||row.length<2) continue;
    const dr = row[0].replace(/"/g,'');
    if (!dr||!/^\d{4}/.test(dr)) continue;
    const ds = dr.substring(0,10);
    if (ds.length<10) continue;
    const n = idx => {
      const v=row[idx];
      if(v===undefined||v===null||v===''||v==='""') return null;
      const num=parseFloat(String(v).replace(/"/g,'').replace(',','.'));
      return isNaN(num)?null:num;
    };
    out.push({
      date:ds,
      todos:       {total:n(1),naoChamados:n(2),chamados:n(3),conectados:n(4),links:n(6),vendas:n(7),semInteresse:n(8),transferencias:n(9)},
      mkt:         {total:n(11),naoChamados:null,chamados:n(12),conectados:n(13),links:null,vendas:n(15),semInteresse:null,transferencias:null},
      assinaturas: {total:n(18),naoChamados:null,chamados:n(19),conectados:n(20),links:null,vendas:n(22),semInteresse:null,transferencias:null},
      webhook:     {total:n(30),naoChamados:null,chamados:n(31),conectados:n(32),links:n(34),vendas:n(36),semInteresse:n(39),transferencias:null},
    });
  }
  return out;
}

// ── VENDAS parser ──
function parseCSVVendas(text) {
  const lines = text.split('\n').map(l=>l.replace(/\r/g,''));
  const out = [];
  for (let i=1;i<lines.length;i++) {
    const row = csvLine(lines[i]);
    if (!row||row.length<2) continue;

    // column: nome(0), telefone(1), dia_de_venda(2), momento(3), pipeline(4), produto(5), valor(6), venda(7)
    const venda = (row[7]||'').replace(/"/g,'').trim().toLowerCase();
    if (venda !== 'sim') continue;

    const nome    = (row[0]||'').replace(/"/g,'').trim();
    const produto = (row[5]||'').replace(/"/g,'').trim();
    const rawDate = (row[2]||'').replace(/"/g,'').trim();
    const rawVal  = (row[6]||'').replace(/"/g,'').replace('R$','').replace(/\s/g,'').trim();

    // Normalize date — handles "2026-01-21T..." and "21/02/2026"
    let dateStr = '';
    if (/^\d{4}-\d{2}-\d{2}/.test(rawDate)) {
      dateStr = rawDate.substring(0,10);
    } else if (/^\d{2}\/\d{2}\/\d{4}/.test(rawDate)) {
      const p = rawDate.split('/');
      dateStr = `${p[2]}-${p[1]}-${p[0]}`;
    } else { continue; }

    const valor = parseFloat(rawVal.replace(',','.'));
    if (!nome || !dateStr) continue;

    out.push({ nome, produto, date: dateStr, valor: isNaN(valor) ? 0 : valor });
  }
  // Sort descending by date
  out.sort((a,b) => b.date.localeCompare(a.date));
  return out;
}

function csvLine(line) {
  const r=[]; let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){r.push(cur);cur='';}else{cur+=c;}
  }
  r.push(cur); return r;
}

// ════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════
function setStatus(s) {
  const dot=document.getElementById('statusDot');
  const lbl=document.getElementById('statusLabel');
  const styles={
    online:`background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;`,
    csv:`background:var(--amber);box-shadow:0 0 8px var(--amber);animation:pulse 2s infinite;`,
    error:`background:var(--red);box-shadow:0 0 8px rgba(227,0,27,.5);`,
  };
  dot.style.cssText=`width:7px;height:7px;border-radius:50%;${styles[s]||''}`;
  lbl.textContent={online:'AO VIVO',csv:'CSV PÚBLICO',error:'ERRO'}[s]||'—';
}

function showError() {
  document.getElementById('loadingOverlay').innerHTML=`
    <div class="error-box">
      <h3>ERRO AO CARREGAR</h3>
      <p>Não foi possível buscar os dados. Verifique se a planilha está publicada.</p>
    </div>`;
}

function getFiltered() {
  const from=document.getElementById('dateFrom').value;
  const to=document.getElementById('dateTo').value;
  return allData.filter(d=>(!from||d.date>=from)&&(!to||d.date<=to));
}

function getSalesFiltered() {
  const from=document.getElementById('salesDateFrom').value;
  const to=document.getElementById('salesDateTo').value;
  return allSales.filter(s=>(!from||s.date>=from)&&(!to||s.date<=to));
}

function segData(row) { return row[seg]; }

function sum(rows,field) {
  let s=0,has=false;
  rows.forEach(r=>{const v=segData(r)[field];if(v!==null){s+=v;has=true;}});
  return has?s:null;
}

const fN = v => v===null?null:Math.round(v).toLocaleString('pt-BR');
const fP = v => v===null?null:v.toFixed(1)+'%';
const fBRL = v => v===null?null:'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fD  = d => new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'});

function aggregates(rows) {
  const total=sum(rows,'total'), naoChamados=sum(rows,'naoChamados'),
        chamados=sum(rows,'chamados'), conectados=sum(rows,'conectados'),
        links=sum(rows,'links'), vendas=sum(rows,'vendas'),
        semInteresse=sum(rows,'semInteresse'), transferencias=sum(rows,'transferencias');
  return {
    total, naoChamados, chamados, conectados, links, vendas, semInteresse, transferencias,
    taxaConexao: chamados&&conectados!==null ? conectados/chamados*100 : null,
    convTotal:   chamados&&vendas!==null     ? vendas/chamados*100     : null,
    convConexao: conectados&&vendas!==null   ? vendas/conectados*100   : null,
  };
}

// ════════════════════════════════════════════════════════
// METRICS CARDS
// ════════════════════════════════════════════════════════
function buildCard(cfg, agg) {
  const v = agg[cfg.key];
  const isPct = cfg.format==='pct';
  const disp  = v===null ? null : isPct ? fP(v) : fN(v);
  const isHL  = ['chamados','conectados','vendas','taxaConexao','convTotal','convConexao'].includes(cfg.key);

  // Color for rate cards based on rules
  let rateClass = 'is-rate';
  if (isPct && v !== null && PCT_RULES[cfg.key]) {
    const rule = PCT_RULES[cfg.key];
    if (v > rule.high) rateClass = 'is-green-rate';
    else if (v < rule.low) rateClass = 'is-rate'; // red
    else rateClass = 'is-rate-white';
  }

  let note='';
  if(cfg.key==='transferencias') note=`<div class="card-note">⚠ Disponível a partir de Abril/2026</div>`;

  const el=document.createElement('div');
  el.className='card'+(isHL?' highlight':'');
  el.innerHTML=`
    <span class="card-icon">${cfg.icon}</span>
    <div class="card-label">${cfg.label}</div>
    <div class="card-value ${isPct ? rateClass : ''} ${disp===null?'na':''}">${disp!==null?disp:'—'}</div>
    ${v!==null&&!isPct?`<div class="card-sub">${Math.round(v).toLocaleString('pt-BR')} leads</div>`:''}
    ${note}
  `;
  return el;
}

function renderCards(agg) {
  const gP=document.getElementById('gridPrimary');
  const gS=document.getElementById('gridSecondary');
  const ex=document.getElementById('extrasRow');
  gP.innerHTML=''; gS.innerHTML=''; ex.innerHTML='';

  PRIMARY_CARDS.forEach(c => gP.appendChild(buildCard(c,agg)));
  SECONDARY_CARDS.forEach(c => gS.appendChild(buildCard(c,agg)));

  EXTRAS.forEach(cfg => {
    const v=agg[cfg.key];
    let note='';
    if(cfg.key==='transferencias') note=`<div class="card-note">⚠ Disponível a partir de Abril/2026</div>`;
    else if(v===null) note=`<div class="card-note">⚠ Coluna ainda não mapeada neste segmento</div>`;
    const el=document.createElement('div');
    el.className='card';
    el.innerHTML=`
      <span class="card-icon">${cfg.icon}</span>
      <div class="card-label">${cfg.label}</div>
      <div class="card-value ${v===null?'na':''}">${v!==null?fN(v):'—'}</div>
      ${note}
    `;
    ex.appendChild(el);
  });
}

// ════════════════════════════════════════════════════════
// METRICS TABLE
// ════════════════════════════════════════════════════════
function renderTable(rows) {
  document.getElementById('tableHead').innerHTML=
    `<tr>${TABLE_COLS.map(c=>`<th>${c.label}</th>`).join('')}</tr>`;

  const tbody=document.getElementById('tableBody');
  tbody.innerHTML='';

  rows.forEach(row => {
    const d=segData(row);
    const tx=d.chamados?(d.conectados||0)/d.chamados*100:null;
    const ct=d.chamados?(d.vendas||0)/d.chamados*100:null;
    const cc=d.conectados?(d.vendas||0)/d.conectados*100:null;
    const rd={date:row.date,chamados:d.chamados,conectados:d.conectados,links:d.links,vendas:d.vendas,
      taxaConexao:tx,convTotal:ct,convConexao:cc,total:d.total,naoChamados:d.naoChamados,
      semInteresse:d.semInteresse,transferencias:d.transferencias};

    const tr=document.createElement('tr');
    tr.innerHTML=TABLE_COLS.map(col=>{
      const v=rd[col.key];
      if(col.key==='date') return `<td>${fD(v)}</td>`;
      if(v===null) return `<td class="val-na">—</td>`;
      if(col.format==='pct'){
        const cls = col.colorKey ? pctClass(col.colorKey, v) : '';
        return `<td class="${cls}">${v.toFixed(1)}%</td>`;
      }
      const cls=col.key==='vendas'?'val-green':col.key==='chamados'?'val-red':'';
      return `<td class="${cls}">${Math.round(v).toLocaleString('pt-BR')}</td>`;
    }).join('');
    tbody.appendChild(tr);
  });

  const agg=aggregates(rows);
  const fd={date:'TOTAL',chamados:agg.chamados,conectados:agg.conectados,links:agg.links,vendas:agg.vendas,
    taxaConexao:agg.taxaConexao,convTotal:agg.convTotal,convConexao:agg.convConexao,
    total:agg.total,naoChamados:agg.naoChamados,semInteresse:agg.semInteresse,transferencias:agg.transferencias};

  document.getElementById('tableFoot').innerHTML=`<tr>${TABLE_COLS.map(col=>{
    const v=fd[col.key];
    if(col.key==='date') return `<td>TOTAL DO PERÍODO</td>`;
    if(v===null) return `<td>—</td>`;
    if(col.format==='pct'){
      const cls = col.colorKey ? pctClass(col.colorKey, v) : '';
      return `<td class="${cls}">${v.toFixed(1)}%</td>`;
    }
    return `<td>${Math.round(v).toLocaleString('pt-BR')}</td>`;
  }).join('')}</tr>`;
}

// ════════════════════════════════════════════════════════
// METRICS CHART
// ════════════════════════════════════════════════════════
function buildToggles() {
  const c=document.getElementById('chartToggles'); c.innerHTML='';
  METRICS_CONFIG.forEach(m=>{
    const col=METRIC_COLORS[m.key], on=metricVis[m.key];
    const btn=document.createElement('div');
    btn.className='metric-toggle'+(on?' active':'');
    btn.style.cssText=on?`background:${col}22;border-color:${col};color:#fff;`:'';
    btn.innerHTML=`<span class="dot" style="background:${col}"></span>${m.label}`;
    btn.addEventListener('click',()=>{ metricVis[m.key]=!metricVis[m.key]; renderChart(getFiltered()); });
    c.appendChild(btn);
  });
}

function renderChart(rows) {
  buildToggles();
  const labels=rows.map(r=>fD(r.date));
  const series=key=>rows.map(r=>{
    const d=segData(r);
    if(key==='taxaConexao') return d.chamados?(d.conectados||0)/d.chamados*100:null;
    if(key==='convTotal')   return d.chamados?(d.vendas||0)/d.chamados*100:null;
    if(key==='convConexao') return d.conectados?(d.vendas||0)/d.conectados*100:null;
    return d[key];
  });

  const datasets=METRICS_CONFIG.filter(m=>metricVis[m.key]).map(m=>({
    label:m.label, data:series(m.key),
    borderColor:METRIC_COLORS[m.key], backgroundColor:METRIC_COLORS[m.key]+'18',
    borderWidth:2, pointRadius:rows.length>60?0:3, pointHoverRadius:5,
    tension:0.35, fill:false, yAxisID:m.format==='pct'?'yPct':'yNum', spanGaps:true,
  }));

  if(lineChart) lineChart.destroy();
  lineChart=new Chart(document.getElementById('lineChart').getContext('2d'),{
    type:'line', data:{labels,datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#181818',borderColor:'#333',borderWidth:1,
          titleColor:'#f0f0f0',bodyColor:'#aaa',padding:12,
          callbacks:{label:ctx=>{
            const m=METRICS_CONFIG.find(x=>x.label===ctx.dataset.label);
            const v=ctx.parsed.y; if(v===null||v===undefined) return ctx.dataset.label+': —';
            return ctx.dataset.label+': '+(m?.format==='pct'?v.toFixed(1)+'%':Math.round(v).toLocaleString('pt-BR'));
          }}
        }
      },
      scales:{
        x:{ticks:{color:'#555',font:{family:'JetBrains Mono',size:10},maxTicksLimit:15},grid:{color:'rgba(255,255,255,0.04)'}},
        yNum:{type:'linear',position:'left',ticks:{color:'#555',font:{family:'JetBrains Mono',size:10}},grid:{color:'rgba(255,255,255,0.04)'}},
        yPct:{type:'linear',position:'right',ticks:{color:'#777',font:{family:'JetBrains Mono',size:10},callback:v=>v.toFixed(0)+'%'},grid:{drawOnChartArea:false}},
      }
    }
  });
}

// ════════════════════════════════════════════════════════
// FUNNEL
// ════════════════════════════════════════════════════════
function renderFunnel(agg) {
  const steps=[
    {label:'Chamados',  value:agg.chamados},
    {label:'Conectados',value:agg.conectados},
    {label:'Links',     value:agg.links},
    {label:'Vendas',    value:agg.vendas},
  ].filter(s=>s.value!==null&&s.value>0);
  const c=document.getElementById('funnelContainer'); c.innerHTML='';
  if(!steps.length){c.innerHTML='<div class="empty-state">Sem dados para o funil no período.</div>';return;}
  const mx=steps[0].value||1;
  steps.forEach((s,i)=>{
    if(i>0){const conn=document.createElement('div');conn.className='funnel-connector';c.appendChild(conn);}
    const el=document.createElement('div'); el.className='funnel-step';
    const rel=i===0?'100%':(s.value/mx*100).toFixed(0)+'%';
    const pct=i===0?'100%':(s.value/steps[0].value*100).toFixed(1)+'%';
    el.innerHTML=`
      <div class="funnel-bar-wrap">
        <div class="funnel-bar-bg"></div>
        <div class="funnel-bar-fill" style="width:0%"></div>
        <div class="funnel-bar-text">
          <span class="funnel-step-name">${s.label}</span>
          <span class="funnel-step-val">${Math.round(s.value).toLocaleString('pt-BR')}</span>
        </div>
      </div>
      <div class="funnel-pct">${pct}</div>`;
    c.appendChild(el);
    setTimeout(()=>el.querySelector('.funnel-bar-fill').style.width=rel,50+i*80);
  });
}

// ════════════════════════════════════════════════════════
// SALES PAGE
// ════════════════════════════════════════════════════════
function renderSalesPage() {
  const rows = getSalesFiltered();

  const totalFat  = rows.reduce((s,r) => s + r.valor, 0);
  const totalQty  = rows.length;
  const avgTicket = totalQty > 0 ? totalFat / totalQty : 0;

  // ── Cards ──
  document.getElementById('salesCards').innerHTML = `
    <div class="sales-card s-revenue">
      <span class="sc-icon">💵</span>
      <div class="sc-label">Faturamento</div>
      <div class="sc-value green">${fBRL(totalFat)}</div>
      <div class="sc-sub">${totalQty} venda${totalQty!==1?'s':''} no período</div>
    </div>
    <div class="sales-card s-count">
      <span class="sc-icon">🛒</span>
      <div class="sc-label">Número de Vendas</div>
      <div class="sc-value">${totalQty.toLocaleString('pt-BR')}</div>
      <div class="sc-sub">somente registros confirmados</div>
    </div>
    <div class="sales-card s-ticket">
      <span class="sc-icon">🏷️</span>
      <div class="sc-label">Ticket Médio</div>
      <div class="sc-value amber">${fBRL(avgTicket)}</div>
      <div class="sc-sub">faturamento ÷ vendas</div>
    </div>
  `;

  // ── Line chart ──
  renderSalesChart(rows);

  // ── Table ──
  document.getElementById('salesTableHead').innerHTML = `
    <tr>
      <th>Data</th>
      <th>Nome</th>
      <th>Produto</th>
      <th>Valor</th>
    </tr>`;

  const tbody = document.getElementById('salesTableBody');
  tbody.innerHTML = '';

  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:32px;font-family:'JetBrains Mono',monospace;">Nenhuma venda no período selecionado.</td></tr>`;
  } else {
    rows.forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="td-date">${fD(r.date)}</td>
        <td class="td-name">${r.nome}</td>
        <td class="td-prod">${r.produto}</td>
        <td class="td-val">${r.valor > 0 ? fBRL(r.valor) : '—'}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  document.getElementById('salesTableFoot').innerHTML = `
    <tr>
      <td class="tf-label" colspan="3">TOTAL DO PERÍODO</td>
      <td class="tf-val">${fBRL(totalFat)}</td>
    </tr>`;
}

// ── Sales chart ──
function buildSalesChartToggles() {
  const c = document.getElementById('salesChartToggles'); c.innerHTML='';
  SALES_METRICS.forEach(m => {
    const on = salesVis[m.key];
    const btn = document.createElement('div');
    btn.className = 'metric-toggle'+(on?' active':'');
    btn.style.cssText = on?`background:${m.color}22;border-color:${m.color};color:#fff;`:'';
    btn.innerHTML = `<span class="dot" style="background:${m.color}"></span>${m.label}`;
    btn.addEventListener('click',()=>{ salesVis[m.key]=!salesVis[m.key]; renderSalesChart(getSalesFiltered()); });
    c.appendChild(btn);
  });
}

function renderSalesChart(rows) {
  buildSalesChartToggles();

  // Group by date
  const byDate = {};
  rows.forEach(r => {
    if (!byDate[r.date]) byDate[r.date] = {faturamento:0, quantidade:0};
    byDate[r.date].faturamento += r.valor;
    byDate[r.date].quantidade  += 1;
  });

  // All unique dates sorted asc
  const dates = Object.keys(byDate).sort();
  const labels = dates.map(d => fD(d));

  const datasets = SALES_METRICS.filter(m=>salesVis[m.key]).map(m=>({
    label: m.label,
    data: dates.map(d => byDate[d][m.key]),
    borderColor: m.color,
    backgroundColor: m.color+'18',
    borderWidth: 2,
    pointRadius: dates.length > 60 ? 0 : 4,
    pointHoverRadius: 6,
    tension: 0.35, fill: false,
    yAxisID: m.yAxis,
    spanGaps: true,
  }));

  if(salesChart) salesChart.destroy();
  salesChart = new Chart(document.getElementById('salesLineChart').getContext('2d'),{
    type:'line', data:{labels,datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#181818',borderColor:'#333',borderWidth:1,
          titleColor:'#f0f0f0',bodyColor:'#aaa',padding:12,
          callbacks:{label:ctx=>{
            const m=SALES_METRICS.find(x=>x.label===ctx.dataset.label);
            const v=ctx.parsed.y;
            if(m?.key==='faturamento') return 'Faturamento: '+fBRL(v);
            return 'Nº Vendas: '+Math.round(v);
          }}
        }
      },
      scales:{
        x:{ticks:{color:'#555',font:{family:'JetBrains Mono',size:10},maxTicksLimit:15},grid:{color:'rgba(255,255,255,0.04)'}},
        yBRL:{
          type:'linear', position:'left',
          ticks:{color:'#22c55e',font:{family:'JetBrains Mono',size:10},callback:v=>'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:0})},
          grid:{color:'rgba(255,255,255,0.04)'},
        },
        yCount:{
          type:'linear', position:'right',
          ticks:{color:'#E3001B',font:{family:'JetBrains Mono',size:10},callback:v=>Math.round(v)},
          grid:{drawOnChartArea:false},
        },
      }
    }
  });
}

// ════════════════════════════════════════════════════════
// DEFAULT DATES
// ════════════════════════════════════════════════════════
function setDefaultDates() {
  const now  = new Date();
  const yyyy = now.getFullYear();
  const mm   = String(now.getMonth()+1).padStart(2,'0');
  const dd   = String(now.getDate()).padStart(2,'0');
  document.getElementById('dateFrom').value     = `${yyyy}-${mm}-01`;
  document.getElementById('dateTo').value       = `${yyyy}-${mm}-${dd}`;
  document.getElementById('salesDateFrom').value = `${yyyy}-${mm}-01`;
  document.getElementById('salesDateTo').value   = `${yyyy}-${mm}-${dd}`;
}

// ════════════════════════════════════════════════════════
// REFRESH
// ════════════════════════════════════════════════════════
function refresh() {
  if (activePage === 'metrics') {
    const rows=getFiltered();
    const agg=aggregates(rows);
    if(viewMode==='cards') { renderCards(agg); renderChart(rows); renderFunnel(agg); }
    else { renderTable(rows); }
  } else {
    renderSalesPage();
  }
}

function switchView(mode) {
  viewMode=mode;
  document.getElementById('cardsView').style.display   = mode==='cards'?'':'none';
  document.getElementById('tableView').style.display   = mode==='table'?'':'none';
  document.getElementById('btnViewCards').classList.toggle('active',mode==='cards');
  document.getElementById('btnViewTable').classList.toggle('active',mode==='table');
  refresh();
}

function switchPage(page) {
  activePage = page;
  document.querySelectorAll('.top-tab').forEach(t=>t.classList.toggle('active',t.dataset.page===page));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id==='page'+capitalize(page)));

  // Show/hide relevant controls
  document.getElementById('segTabsWrap').style.display    = page==='metrics'?'':'none';
  document.getElementById('viewToggleWrap').style.display = page==='metrics'?'':'none';
  document.getElementById('dateFrom').closest('.date-group').style.display    = page==='metrics'?'':'none';
  document.getElementById('salesDateGroup').style.display = page==='sales'?'':'none';

  refresh();
}

function capitalize(s) { return s.charAt(0).toUpperCase()+s.slice(1); }

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
async function init() {
  await fetchData();
  document.getElementById('loadingOverlay').style.display='none';
  if(!allData.length && !allSales.length){showError();return;}

  setDefaultDates();

  // Segment tabs
  document.querySelectorAll('.seg-tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.seg-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); seg=btn.dataset.seg; refresh();
    });
  });

  // Top nav
  document.querySelectorAll('.top-tab').forEach(btn=>{
    btn.addEventListener('click',()=>switchPage(btn.dataset.page));
  });

  // View toggle
  document.getElementById('btnViewCards').addEventListener('click',()=>switchView('cards'));
  document.getElementById('btnViewTable').addEventListener('click',()=>switchView('table'));

  // Secondary cards toggle
  document.getElementById('btnToggleSecondary').addEventListener('click',()=>{
    showSecondary=!showSecondary;
    document.getElementById('secondaryBlock').classList.toggle('visible',showSecondary);
    document.getElementById('btnToggleSecondary').classList.toggle('active',showSecondary);
    document.getElementById('lblSecondary').textContent=showSecondary?'Ocultar dados secundários':'Ver dados secundários';
  });

  // Date apply buttons
  document.getElementById('btnApply').addEventListener('click',refresh);
  document.getElementById('btnSalesApply').addEventListener('click',refresh);

  refresh();
}

init();
</script>
